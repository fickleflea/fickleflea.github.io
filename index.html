<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fickle Flea</title>
    <link rel="icon" href="./flea2.jpg">
    <style>
        #logo > input, #flead-flea > input {
            display: none;
        }

        #logo > img, #flead-flea > img {
            cursor: pointer;
        }

        #logo > input:checked + img {
            content: url(./flea1.gif);
        }

        #logo > img {
            content: url(./logosm.png);
        }

        #flead-flea > input:checked + img {
            content: url(./cutiebug.jpg);
            height: 118px;
        }

        #socials > a {
            vertical-align: top;
            margin-right: 5px;
            display: inline-block;
        }

        body, header > h1 {
            margin: 0;
        }

        header {
            padding-top: 5px;
            text-align: center;
        }

        #app {
            min-height: 100vh;
            padding-left: 5px;
            padding-right: 5px;
            text-align: center;
            /* background: #86492D url("./wood-bg.jpg") fixed center left; */
        }

        h1 {
            font-family: cursive;
        }

        p {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-size: 1.4em;
            background-color: #FFFB;
            box-shadow: 0px 0px 5px #FFFB;
        }

        footer {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <label id="logo">
                <input type="checkbox" disabled>
                <img alt="The Fickle Flea" title="all things vintage" height="100px" src="./logo.png">
            </label>
            <nav id="socials">
                <a href="https://www.instagram.com/jennyv_thefickleflea/">
                    <img alt="Instagram" width="64px" height="64px" src="./instaflea.svg">
                </a>
                <a href="https://www.facebook.com/TheFickleFlea/">
                    <img alt="Facebook" width="64px" height="64px" src="./fleabook.svg">
                </a>
            </nav>
        </header>
        <main>
            <p>Your one-stop shop for all things vintage!</p>
        </main>
    </div>
    <footer>
        <img title="sluuuuuuuuuuurp" src="./drink.gif">
        <label id="flead-flea">
            <input type="checkbox">
            <img height="29px" title="sweet fleadom" src="flea2.jpg">
        </label>
    </footer>
</body>
</html>
