<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fickle Flea</title>
    <link rel="icon" href="./flea2.jpg">
    <style>
        #logo > input, #flead-flea > input {
            display: none;
        }

        #logo > img, #flead-flea > img {
            cursor: pointer;
        }

        #logo > input:checked + img {
            content: url(./flea1.gif);
        }

        #flead-flea > input:checked + img {
            content: url(./cutiebug.jpg);
            height: 118px;
        }

        body, header > h1 {
            margin-top: 0;
        }

        #app {
            min-height: 100vh;
        }

        h1 {
            font-family: cursive;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <label id="logo">
                <input type="checkbox">
                <img alt="The Fickle Flea" title="all things vintage" height="100px" src="./logo.png">
            </label>
        </header>
        <main>
            <p>Vintage</p>
        </main>
    </div>
    <footer>
        <img title="sluuuuuuuuuuurp" src="./drink.gif">
        <label id="flead-flea">
            <input type="checkbox">
            <img height="29px" title="sweet fleadom" src="flea2.jpg">
        </label>
    </footer>
</body>
</html>
